<div class="bg-gray-800 border border-gray-700 rounded-lg p-6 hover:border-gray-600 transition-colors">
  <div class="flex items-start justify-between mb-4">
    <div class="flex-1">
      <h3 class="text-xl font-semibold text-white mb-1">
        <a [routerLink]="['/queues', queue.id]" class="hover:text-blue-400 transition-colors">
          {{ queue.name }}
        </a>
      </h3>
      @if (queue.description) {
        <p class="text-sm text-gray-400">{{ queue.description }}</p>
      }
    </div>
    <div class="flex gap-2 ml-4">
      <button
        (click)="onEdit($event)"
        class="p-2 text-gray-400 hover:text-blue-400 hover:bg-gray-700 rounded-lg transition-colors"
        title="Edit queue"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
        </svg>
      </button>
      <button
        (click)="onDelete($event)"
        class="p-2 text-gray-400 hover:text-red-400 hover:bg-gray-700 rounded-lg transition-colors"
        title="Delete queue"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Active Task Preview -->
  <div class="mt-4 pt-4 border-t border-gray-700">
    @if (queue.activeTask) {
      <div class="flex items-start justify-between">
        <div class="flex-1">
          <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">Active Task</p>
          <p class="text-white font-medium">{{ queue.activeTask.title }}</p>
          @if (queue.activeTask.description) {
            <p class="text-sm text-gray-400 mt-1 line-clamp-2">{{ queue.activeTask.description }}</p>
          }
        </div>
        <div class="ml-4">
          <app-priority-badge [priority]="queue.activeTask.priority"></app-priority-badge>
        </div>
      </div>
    } @else {
      <p class="text-gray-500 text-sm italic">No active task</p>
    }
  </div>
</div>
