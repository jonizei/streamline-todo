<div class="bg-gray-800 border border-gray-700 rounded-lg p-4 hover:border-gray-600 transition-colors cursor-pointer" (click)="onEdit()">
  <div class="flex items-start justify-between gap-4">
    <div class="flex-1">
      <div class="flex items-center gap-3 mb-2">
        <h3 class="text-lg font-semibold text-white">{{ task.title }}</h3>
        <span [class]="getStatusColor() + ' text-xs font-medium uppercase'">
          {{ task.status }}
        </span>
      </div>
      @if (task.description) {
        <p class="text-sm text-gray-400 mb-3 line-clamp-2">{{ task.description }}</p>
      }
      <div class="text-xs text-gray-500 space-y-1">
        <div>Created {{ task.created_at | relativeDate }}</div>
        @if (task.custom_deadline) {
          <div>Deadline {{ task.deadline | relativeDate }}</div>
        }
      </div>
    </div>
    <div class="flex flex-col items-end gap-2">
      <app-priority-badge [priority]="task.priority"></app-priority-badge>
      @if (task.status === 'Queued') {
        <button
          (click)="$event.stopPropagation(); onEdit()"
          class="p-2 text-gray-400 hover:text-blue-400 hover:bg-gray-700 rounded-lg transition-colors"
          title="Edit task"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
          </svg>
        </button>
      }
    </div>
  </div>
</div>
