@if (isOpen) {
  <div
    class="fixed inset-0 z-50 overflow-y-auto"
    (click)="onBackdropClick($event)"
  >
    <div class="flex min-h-screen items-center justify-center sm:p-4">
      <!-- Backdrop -->
      <div class="fixed inset-0 bg-black bg-opacity-75 transition-opacity" (click)="onClose()"></div>

      <!-- Modal Content -->
      <div class="relative bg-gray-800 sm:rounded-lg max-w-2xl w-full min-h-screen sm:min-h-0 shadow-xl">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
}
